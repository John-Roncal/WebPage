<div class=" tw-flex tw-flex-col tw-items-center tw-justify-center tw-min-h-screen tw-py-40">
    <form (ngSubmit)="submit($event)"  [formGroup]="form" class=" tw-space-y-7 md:tw-w-[400px]">
        <img src="assets/logo.svg" alt="Logo de Kallpa" class="tw-mx-auto tw-w-[200px]">
        <div class="tw-text-center">
            <h1 class="tw-text-2xl md:tw-text-4xl tw-font-bold">Crea tu cuenta</h1>
        </div>
        <div>
            <label for="username"> Correo </label>
            <input type="text" pInputText formControlName="username" placeholder="Nombre de usuario">
        </div>
        <div>
            <label for="password">Contraseña</label>
            <input type="text" pInputText formControlName="password" placeholder="Contraseña de usuario">
        </div>

        <div>
            <label for="phone"> Telefono</label>
            <input type="text" pInputText formControlName="phone" placeholder="Telefono">
        </div>

        <div class="tw-grid tw-grid-cols-2 tw-gap-3">
            <div>
                <label for="phone"> Nombre</label>
                <input type="text" pInputText formControlName="name" placeholder="Nombre de usuario">
            </div>
            <div>
                <label for="phone"> Apellido</label>
                <input type="text" pInputText formControlName="lastName" placeholder="Apellido de usuario">
            </div>
        </div>


        <div class="tw-text-center">
            <button type="submit" class="tw-bg-[#e60f00] tw-text-white tw-rounded-2xl tw-px-7 tw-py-4 tw-text-2xl hover:tw-bg-black tw-transition-all tw-duration-300">Registrarse</button>
        </div>

        <div class="tw-text-center tw-text-lg tw-font-bold ">
            <p class="tw-mt-20 ">¿Ya tienes cuenta? <br> <a class="tw-text-[#FF8127] tw-text-end tw-cursor-pointer hover:tw-text-yellow-700 tw-underline" [routerLink]="['/auth/login']" >Iniciar sesion</a></p>
        </div>

    </form>
</div>
