<div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-2 tw-gap-y-16">
    <div class="tw-max-w-[400px] tw-mx-auto">
        <h1 class="tw-text-3xl tw-font-bold tw-text-center">Consulta Guia de remision</h1>
        <form (ngSubmit)="submit($event)" action="" [formGroup]="form" class="tw-mt-5 tw-grid tw-grid-cols-2 tw-gap-y-10 tw-gap-x-3 ">
            <input
            class="tw-col-span-2"
            type="text" 
            pInputText  
            formControlName="ruc" 
            placeholder="RUC" 
            variant="filled" />
    
            <p-dropdown 
            class="tw-w-full tw-col-span-2"
            [options]="tipos" 
            optionValue="value"
            optionLabel="label"
            formControlName="tipo"
            placeholder="Tipo de comprobante" />
    
            <input
            type="text" 
            pInputText  
            formControlName="serie" 
            placeholder="Serie" 
            variant="filled" />
    
            <input
            type="text" 
            pInputText  
            formControlName="numero" 
            placeholder="Número" 
            variant="filled" />
    
            <div class="tw-col-span-2">
                <p-calendar 
                formControlName="fechaEmision" 
                [showIcon]="true"
                dateFormat="dd/mm/yy"
                [iconDisplay]="'input'" 
                [showIcon]="true" 
                inputId="icondisplay" 
                placeholder="Selecciona fecha de emision"
                />
            </div>
    
    
            <div class="tw-col-span-2">
                <h1 class="tw-ml-3 tw-mb-1">Informacion del receptor</h1>
                <div class="tw-grid tw-grid-cols-2 tw-gap-3">
                    <p-dropdown 
                    class="tw-w-full "
                    [options]="receptorType" 
                    optionValue="value"
                    optionLabel="label"
                    formControlName="tipoDocumento"
                    placeholder="Documento" />
            
                    <input
                    class=""
                    type="text" 
                    pInputText  
                    formControlName="numeroDocumento" 
                    placeholder="Numero" 
                    variant="filled" />
                </div>
            </div>
    
    
    
            <div class="tw-col-span-2 tw-text-center">
                <button type="submit" class="default_buttom !tw-text-lg !tw-px-5 !tw-py-3">Consultar</button>
            </div>
    
    
        </form>
    </div>
    <div 
    #invoiceSection
    class="tw-flex tw-flex-col tw-justify-start tw-items-center  tw-max-w-[400px] tw-mx-auto"
    [ngClass]="{'tw-hidden': !showInvoice}"
    >
    @if (showInvoice) {
        @if (isSuccess) {
            <div class="tw-text-center tw-text-green-500">
                <i class="pi pi-check-circle tw-text-3xl "></i>
                <p class="tw-text-3xl tw-font-bold">Documento encontrado</p>
                <p class="tw-text-md  tw-text-gray-700">Puedes descargar tanto tu CDR, XML y PDF en los siguientes enlaces</p>
            </div>
            <div class="tw-mt-5 tw-text-white  tw-w-full tw-space-y-5">
    
                <button class="tw-bg-[#FF1717]  tw-py-2 tw-rounded-3xl tw-w-full tw-space-x-5">
                    <i class="pi pi-download tw-text-lg "></i>
                    <span>Descargar PDF</span>
                </button>
    
                <button class="tw-bg-[#FF1717]  tw-py-2 tw-rounded-3xl tw-w-full tw-space-x-5">
                    <i class="pi pi-download tw-text-lg "></i>
                    <span>Descargar XML</span>
                </button>
    
                <button class="tw-bg-[#FF1717]  tw-py-2 tw-rounded-3xl tw-w-full tw-space-x-5">
                    <i class="pi pi-download tw-text-lg "></i>
                    <span>Descargar CDR</span>
                </button>
            </div>
        }
        @else {
            <div class="tw-text-center tw-text-red-500">
                <i class="pi pi-times tw-text-3xl "></i>
                <p class="tw-text-3xl tw-font-bold">Documento no encontrado</p>
                <p class="tw-text-md  tw-text-gray-700">Asgúrese de que los datos sean correctos</p>
            </div>
        }
    }
    </div>

</div>
