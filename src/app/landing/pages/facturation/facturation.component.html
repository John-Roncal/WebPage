<section id="facturation" class="tw-bg-white tw-py-20">
  <div class="tw-container tw-mx-auto tw-px-4">
    

    <div class="tw-text-center tw-mb-16">


      <h1 class="tw-text-4xl lg:tw-text-5xl tw-font-bold tw-text-gray-800 tw-mb-4">
        ¿Por qué
        <span class="tw-text-transparent tw-bg-clip-text tw-bg-gradient-to-r tw-from-red-500 tw-to-orange-500">
          Kallpa?
        </span>
      </h1>
      
    </div>

    <!-- Grid de características -->
    <div class="tw-max-w-7xl tw-mx-auto">
      <div class="tw-grid tw-grid-cols-1 md:tw-grid-cols-2 lg:tw-grid-cols-3 tw-gap-8 lg:tw-gap-12">
        <div 
          *ngFor="let item of facturation; let i = index" 
          class="tw-group tw-text-center tw-p-6 tw-rounded-2xl tw-transition-all tw-duration-300 "
        >
          
          <!-- Contenedor del ícono con efecto -->
          <div class="tw-mb-6 tw-relative">
            <div class="tw-inline-flex tw-items-center tw-justify-center tw-w-20 tw-h-20 tw-bg-gradient-to-r tw-from-red-500 tw-to-orange-500 tw-rounded-2xl tw-shadow-lg tw-mb-4 ">
              <img 
                [src]="item.icon" 
                alt="ícono {{item.title}}"
                [ngClass]="{
                  'tw-w-12 tw-h-8': i === 0,
                  'tw-w-10 tw-h-8': i !== 0
                }"
                class="tw-filter tw-brightness-0 tw-invert"
              />
            </div>
            
            <!-- Efecto de resplandor -->
            <div class="tw-absolute tw-inset-0 tw-w-20 tw-h-20 tw-mx-auto tw-bg-gradient-to-r tw-from-red-400 tw-to-orange-400 tw-rounded-2xl tw-opacity-0 group-hover:tw-opacity-20 tw-blur-xl tw-transition-all tw-duration-300"></div>
          </div>
          
          <!-- Contenido -->
          <div class="tw-space-y-4">
            <h3 class="tw-text-2xl tw-font-bold tw-text-gray-800 ">
              {{item.title}}
            </h3>
            
            <p class="tw-text-gray-600 tw-leading-relaxed tw-text-lg group-hover:tw-text-gray-700 tw-transition-colors tw-duration-300">
              {{item.description}}
            </p>
          </div>
          
          <!-- Indicador de hover -->
          <div class="tw-w-0 group-hover:tw-w-full tw-h-1 tw-bg-gradient-to-r tw-from-red-500 tw-to-orange-500 tw-rounded-full tw-mx-auto tw-mt-6 tw-transition-all tw-duration-300"></div>
        </div>
      </div>
    </div>

  </div>
</section>
