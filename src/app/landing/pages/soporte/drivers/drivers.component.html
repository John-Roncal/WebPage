<div class="tw-bg-white tw-py-16 tw-px-6 sm:tw-px-12 lg:tw-px-24 tw-mt-14 tw-mb-48">
  <h2 class="tw-text-center tw-text-4xl lg:tw-text-5xl tw-font-extrabold tw-text-gray-900 tw-mb-16">
    Drivers de
    <span class="tw-text-transparent tw-bg-clip-text tw-bg-gradient-to-r tw-from-red-500 tw-to-orange-500">
      Instalación
    </span>
  </h2>

  <!-- 🧱 GRID GENERAL: dos mitades -->
  <div class="tw-relative tw-grid tw-grid-cols-1 lg:tw-grid-cols-2 tw-gap-16">

    <!-- 🔸 Línea divisoria (solo en pantallas grandes) -->
    <div
      class="tw-hidden lg:tw-block tw-absolute tw-left-1/2 tw-top-0 tw-w-px tw-h-full tw-bg-gradient-to-b tw-from-red-500 tw-to-orange-500 tw-opacity-30">
    </div>

    <!-- 🖨️ Drivers de Impresoras -->
    <div>
      <div class="tw-flex tw-items-center tw-gap-3 tw-mb-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="tw-w-8 tw-h-8 tw-text-orange-500" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" />
        </svg>
        <h3 class="tw-text-2xl tw-font-bold tw-text-gray-800">Drivers de Impresoras</h3>
      </div>

      <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-10 tw-justify-items-center">
        <div *ngFor="let driver of printerDrivers" class="tw-bg-white tw-rounded-2xl tw-shadow-md tw-p-8 tw-text-center tw-border tw-border-gray-100 
                 tw-transition-transform hover:tw-scale-105 hover:tw-shadow-xl tw-w-full tw-max-w-sm 
                 tw-h-full tw-flex tw-flex-col tw-justify-between">
          <svg xmlns="http://www.w3.org/2000/svg" class="tw-w-16 tw-h-16 tw-mx-auto tw-mb-6 tw-text-orange-500"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z" />
          </svg>

          <h4 class="tw-text-xl tw-font-semibold tw-text-gray-800 tw-mb-6 tw-leading-snug">
            {{ driver.nombre }}
          </h4>

          <a [href]="driver.link" target="_blank"
            class="tw-inline-flex tw-items-center tw-justify-center tw-bg-gradient-to-r tw-from-orange-500 tw-to-red-500 
                   tw-text-white tw-font-semibold tw-rounded-full tw-px-6 tw-py-3 hover:tw-opacity-90 tw-transition-all tw-duration-200">
            <i class="pi pi-download tw-mr-2"></i> Descargar
          </a>
        </div>
      </div>
    </div>

    <!-- 🧰 Drivers Herramienta -->
    <div>
      <div class="tw-flex tw-items-center tw-gap-3 tw-mb-10">
        <svg xmlns="http://www.w3.org/2000/svg" class="tw-w-8 tw-h-8 tw-text-red-500" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 7h2l2 10h10l2-10h2M6 7V5a2 2 0 012-2h8a2 2 0 012 2v2" />
        </svg>
        <h3 class="tw-text-2xl tw-font-bold tw-text-gray-800">Drivers Herramienta</h3>
      </div>

      <div class="tw-grid tw-grid-cols-1 sm:tw-grid-cols-2 tw-gap-10 tw-justify-items-center">
        <div *ngFor="let driver of toolDrivers" class="tw-bg-white tw-rounded-2xl tw-shadow-md tw-p-8 tw-text-center tw-border tw-border-gray-100 
                 tw-transition-transform hover:tw-scale-105 hover:tw-shadow-xl tw-w-full tw-max-w-sm 
                 tw-h-full tw-flex tw-flex-col tw-justify-between">
          <svg xmlns="http://www.w3.org/2000/svg" class="tw-w-16 tw-h-16 tw-mx-auto tw-mb-6 tw-text-red-500" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 7h2l2 10h10l2-10h2M6 7V5a2 2 0 012-2h8a2 2 0 012 2v2" />
          </svg>

          <h4 class="tw-text-xl tw-font-semibold tw-text-gray-800 tw-mb-6 tw-leading-snug">
            {{ driver.nombre }}
          </h4>

          <a [href]="driver.link" target="_blank"
            class="tw-inline-flex tw-items-center tw-justify-center tw-bg-gradient-to-r tw-from-red-500 tw-to-orange-500 
                   tw-text-white tw-font-semibold tw-rounded-full tw-px-6 tw-py-3 hover:tw-opacity-90 tw-transition-all tw-duration-200">
            <i class="pi pi-download tw-mr-2"></i> Descargar
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>
